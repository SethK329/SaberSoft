; ============================================================
;  Lightsaber Firmware — PlatformIO Project Configuration
;  Target: ESP32-S3 (e.g. Unexpected Maker FeatherS3,
;          Adafruit ESP32-S3 Mini, or generic ESP32-S3 Mini)
; ============================================================

[env:esp32-s3]
platform  = espressif32
board     = esp32-s3-devkitc-1          ; works for most ESP32-S3 mini boards
                                         ; change to your specific board if needed
framework = arduino

; Serial monitor settings
monitor_speed = 115200

; Upload speed — lower if you get upload errors
upload_speed = 921600

; Required libraries
lib_deps =
    adafruit/Adafruit NeoPixel @ ^1.12.0

; Build flags
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1          ; enables USB Serial on ESP32-S3
    -DCORE_DEBUG_LEVEL=0                 ; set to 5 for verbose debug output

; Partition scheme — use "default" unless you need OTA
board_build.partitions = default.csv

; Flash mode
board_upload.flash_size = 4MB
